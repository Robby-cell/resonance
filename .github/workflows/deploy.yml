name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine base path
        id: basepath
        run: |
          # For project pages (username.github.io/repo-name), we need a base path.
          # For user/org pages (username.github.io), the base path is empty.
          REPO="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY%/*}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            echo "basepath=" >> $GITHUB_OUTPUT
          else
            echo "basepath=/$REPO" >> $GITHUB_OUTPUT
          fi

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.basepath }}
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
